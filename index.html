<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARMAN VAI | OMNI_CORE_SYSTEM_V4</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');
        
        :root { --neon: #00ff41; --danger: #ff0000; --cyan: #00ffff; --gold: #ffd700; --bg: #000; }
        
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono', monospace; overflow: hidden; height: 100vh; }

        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.7; }

        .omniforce-ui { display: flex; flex-direction: column; height: 100vh; padding: 10px; box-sizing: border-box; }

        .header-bar { display: flex; justify-content: space-between; border-bottom: 2px solid var(--danger); padding: 5px; font-size: 14px; background: rgba(20,0,0,0.8); box-shadow: 0 0 25px rgba(255,0,0,0.5); font-family: 'Orbitron', sans-serif; }

        .core-master-section { display: flex; flex-direction: column; align-items: center; margin-top: 15px; }
        .orbital-frame { position: relative; width: 230px; height: 230px; display: flex; align-items: center; justify-content: center; }
        
        .profile-img { 
            width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--neon); 
            z-index: 10; object-fit: cover; box-shadow: 0 0 50px var(--neon); 
        }

        .scanner { position: absolute; border-radius: 50%; border: 2px solid transparent; animation: rotate 3s linear infinite; }
        .s1 { width: 180px; height: 180px; border-top: 5px solid var(--cyan); }
        .s2 { width: 210px; height: 210px; border-bottom: 4px solid var(--danger); animation-duration: 2s; }
        .s3 { width: 240px; height: 240px; border-left: 3px dashed var(--gold); animation-duration: 5s; }
        .s4 { width: 270px; height: 270px; border-right: 2px solid var(--neon); animation-duration: 8s; opacity: 0.3;}
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .monir-signature { 
            font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 900; 
            color: #fff; letter-spacing: 10px; margin: 15px 0; 
            text-shadow: 0 0 20px var(--cyan), 0 0 40px var(--danger); 
        }

        .social-command-center { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 550px; margin-bottom: 20px; }
        .command-btn { 
            text-decoration: none; color: #fff; background: rgba(0, 0, 0, 0.8); 
            border: 2px solid var(--neon); padding: 15px; font-size: 14px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s; clip-path: polygon(15% 0, 100% 0, 85% 100%, 0 100%);
            font-family: 'Orbitron', sans-serif;
        }
        .command-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 30px var(--danger); transform: scale(1.05) skewX(-5deg); }

        .tool-suite { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 550px; margin-bottom: 20px; }
        .tool-module { 
            background: rgba(0, 50, 0, 0.7); border: 2px solid var(--cyan); padding: 15px; 
            text-align: center; font-size: 13px; cursor: pointer; transition: 0.3s;
            clip-path: polygon(0 0, 100% 10%, 100% 100%, 0 90%);
            font-family: 'Orbitron', sans-serif; font-weight: bold;
        }
        .tool-module:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); transform: scale(1.05); }

        .terminal-feed { 
            flex-grow: 1; background: rgba(0, 10, 0, 0.98); border: 3px solid var(--neon); 
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            border-radius: 8px; box-shadow: inset 0 0 50px rgba(0,255,65,0.3);
        }
        .terminal-header-line { background: var(--neon); color: #000; padding: 5px 15px; font-size: 12px; font-weight: bold; display: flex; justify-content: space-between; }
        .terminal-body { padding: 15px; font-size: 14px; color: var(--neon); line-height: 1.5; overflow-y: scroll; scrollbar-width: none; -ms-overflow-style: none; }
        .terminal-body::-webkit-scrollbar { display: none; }
        
        .cursor { display: inline-block; width: 8px; height: 18px; background: var(--neon); animation: blink 0.5s infinite; vertical-align: bottom; margin-left: 5px; }
        @keyframes blink { 50% { opacity: 0; } }

        .scanline-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05)); background-size: 100% 4px, 4px 100%; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="omniforce-ui">
    <div class="header-bar">
        <span><i class="fas fa-satellite-dish"></i> OMNI-CORE_SYSTEM // STATUS: INTRUSION ACTIVE</span>
        <span>CPU:<span id="cpu_load">99</span>% | RAM:<span id="ram_use">90</span>% | D_PACKETS:<span id="packet_count">123456</span></span>
    </div>

    <div class="core-master-section">
        <div class="orbital-frame">
            <div class="scanner s1"></div>
            <div class="scanner s2"></div>
            <div class="scanner s3"></div>
            <div class="scanner s4"></div>
            <img src="https://i.ibb.co/pr5yn1vg/image.jpg" class="profile-img">
        </div>
        
        <div class="monir-signature">ARMAN VAI</div>

        <div class="social-command-center">
            <a href="https://www.facebook.com/share/1DmE2rHoC9/" target="_blank" class="command-btn"><i class="fab fa-facebook-f"></i> FACEBOOK</a>
            <a href="https://t.me/arman_vai71" target="_blank" class="command-btn"><i class="fab fa-telegram-plane"></i> TELEGRAM</a>
            <a href="https://wa.me/8801936231287" target="_blank" class="command-btn"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
        </div>

        <div class="tool-suite">
            <div class="tool-module" onclick="activateTool('QUANTUM_DECRYPTOR')"><i class="fas fa-lock-open"></i><br>Q_DECRYPTOR</div>
            <div class="tool-module" onclick="activateTool('GLOBAL_NETWORK_MAPPER')"><i class="fas fa-globe"></i><br>G_MAPPER</div>
            <div class="tool-module" onclick="activateTool('DARK_WEB_SCANNER')"><i class="fas fa-eye"></i><br>D_SCANNER</div>
        </div>

        <div class="terminal-feed">
            <div class="terminal-header-line">
                <span>SYSTEM_LOGS // ROOT@ARMAN_VAI</span>
                <span id="system_time"></span>
            </div>
            <div class="scanline-overlay"></div>
            <div id="terminal_output" class="terminal-body"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resizeCanvas; resizeCanvas();

    const matrixChars = "01$#@&*ABCDEFGHIJKLMNOPQRSTUVWXYZ☠☣☢𖦹⚡︎";
    const fontSize = 18;
    const columns = Math.floor(canvas.width / fontSize);
    const drops = Array(columns).fill(1);

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0";
        ctx.font = fontSize + "px monospace";
        for (let i = 0; i < drops.length; i++) {
            const text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(drawMatrix, 10);

    const terminalOutput = document.getElementById('terminal_output');
    const hackingLogs = [
        "INIT: Core system activated...",
        "STATUS: Arman Vai detected, authorization granted.",
        "TARGET: Global financial network identified.",
        "PHASE 1: Bypassing Quantum-level firewalls...",
        "PROGRESS: Firewall modules 1-7 bypassed. Module 8: Initiating brute-force attack.",
        "INFO: Encrypted packet stream intercepted. Decrypting: AES-256.",
        "ALERT: Counter-intrusion detected. Deploying stealth protocols.",
        "SUCCESS: Counter-intrusion neutralized. Stealth: 100%.",
        "TASK: Extracting financial data from secure servers... [COMPLETE]",
        "LOG: Covert data transfer initiated to Arman's secure vault.",
        "FINAL: All traces purged. System invisible. Command complete."
    ];
    let currentLogIndex = 0;
    let currentCharIndex = 0;
    let currentLineDiv;

    function typeTerminalLine() {
        if (!currentLineDiv) {
            currentLineDiv = document.createElement('div');
            terminalOutput.appendChild(currentLineDiv);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        if (currentCharIndex < hackingLogs[currentLogIndex].length) {
            currentLineDiv.innerHTML = `<span>> ${hackingLogs[currentLogIndex].substring(0, currentCharIndex)}</span><span class="cursor"></span>`;
            currentCharIndex++;
            setTimeout(typeTerminalLine, 15);
        } else {
            currentLineDiv.innerHTML = `<span>> ${hackingLogs[currentLogIndex]}</span>`;
            currentLineDiv = null;
            currentCharIndex = 0;
            currentLogIndex = (currentLogIndex + 1) % hackingLogs.length;
            setTimeout(typeTerminalLine, 500);
        }
    }
    typeTerminalLine();

    function activateTool(toolName) {
        let msg = "";
        let color = "var(--neon)";
        switch (toolName) {
            case 'QUANTUM_DECRYPTOR':
                msg = `RUNNING ${toolName}... Analyzing encrypted signals... Decryption key found.`;
                color = "var(--cyan)";
                break;
            case 'GLOBAL_NETWORK_MAPPER':
                msg = `ACTIVATING ${toolName}... Mapping global network topology... Vulnerabilities identified.`;
                color = "var(--gold)";
                break;
            case 'DARK_WEB_SCANNER':
                msg = `INITIATING ${toolName}... Scanning hidden web layers... High-value targets located.`;
                color = "var(--danger)";
                break;
        }
        const toolDiv = document.createElement('div');
        toolDiv.innerHTML = `<span style="color:${color};">[TOOL]</span> ${msg}`;
        terminalOutput.appendChild(toolDiv);
        terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }

    setInterval(() => {
        document.getElementById('cpu_load').innerText = Math.floor(Math.random() * (99 - 90) + 90);
        document.getElementById('ram_use').innerText = Math.floor(Math.random() * (95 - 85) + 85);
        document.getElementById('packet_count').innerText = Math.floor(Math.random() * 999999) + 100000;
        const now = new Date();
        document.getElementById('system_time').innerText = now.toLocaleTimeString('en-GB');
    }, 1000);
</script>
</body>
</html>
