<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arman VIP - Ultimate Admin (Multi-Access)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: #fff; padding: 15px; margin: 0; }
        .box { background: #161616; padding: 20px; border-radius: 15px; border: 1px solid #ff007f; margin-bottom: 20px; border-top: 5px solid #ff007f; }
        h2 { color: #ff007f; text-align: center; text-transform: uppercase; font-size: 18px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #0f0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(90deg, #ff007f, #8b00ff); color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 5px; transition: 0.3s; }
        button:hover { filter: brightness(1.3); transform: translateY(-2px); }
        .feature-list { height: 150px; overflow-y: scroll; background: #222; padding: 10px; border-radius: 8px; border: 1px solid #444; margin: 10px 0; }
        .req-card { background: #222; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00ff00; }
        .panel-item { display: flex; justify-content: space-between; background: #111; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #333; }
        
        /* Login UI Styles */
        #auth-screen { max-width: 400px; margin: 100px auto; text-align: center; }
        .role-tag { background: #ff007f; color: #fff; padding: 2px 10px; border-radius: 20px; font-size: 12px; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="auth-screen" class="box">
    <h2 style="color: #00ff00;">🔐 STAFF ACCESS</h2>
    <input type="text" id="staff_user" placeholder="Enter Username">
    <input type="password" id="staff_pass" placeholder="Enter Password">
    <button onclick="checkLogin()">VERIFY & LOGIN</button>
</div>

<div id="admin-dashboard" style="display: none;">
    <div class="box" style="border-top: 4px solid #00ff00;">
        <h2 id="greet-user">Welcome Admin</h2>
        <center><span id="user-role" class="role-tag">Role: Unknown</span></center>
    </div>

    <div class="box" id="sec-payment" style="display: none;">
        <h2>💰 Payment Requests</h2>
        <div id="payment-list">Checking...</div>
    </div>

    <div class="box" id="sec-shop" style="display: none;">
        <h2>📱 Shop Control</h2>
        <div class="grid-inputs">
            <input type="text" id="bk_num" placeholder="Bkash Number">
            <input type="text" id="ng_num" placeholder="Nagad Number">
        </div>
        <button onclick="saveNumbers()">Update Payment Numbers</button>
        <input type="text" id="not_text" placeholder="Notice Message">
        <button onclick="updateData('notice', 'not_text')">Update Notice</button>
        <input type="text" id="tg_url" placeholder="Telegram Group Link">
        <button onclick="updateData('tg_url', 'tg_url')">Update Telegram</button>
    </div>

    <div class="box" id="sec-panel" style="display: none;">
        <h2>➕ Add New Panel (100+ Features)</h2>
        <input type="text" id="p_name" placeholder="Panel Name">
        <input type="text" id="p_logo" placeholder="Logo Link">
        <input type="number" id="p_price" placeholder="Price (৳)">
        <p style="font-size: 12px; color: #aaa; margin: 5px 0;">Select Features:</p>
        <div class="feature-list" id="feature-selector"></div>
        <input type="text" id="p_desc" placeholder="Selected Features" readonly>
        <button onclick="addPanel()">🚀 Deploy Panel</button>
    </div>

    <div class="box" id="sec-manage" style="display: none;">
        <h2>📂 Active Panels</h2>
        <div id="panels-list">Loading...</div>
    </div>
    
    <button style="background: #333;" onclick="location.reload()">LOGOUT</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBd3oIfQ6HjGIG10AGwF62QQGe68G1a1H8",
        databaseURL: "https://armanvipstore-default-rtdb.firebaseio.com",
        projectId: "armanvipstore"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref();

    // স্টাফ এবং পারমিশন লিস্ট (আপনি এখান থেকে চেঞ্জ করবেন)
    const STAFF_DATA = {
        "arman_boss": { pass: "0000", role: "OWNER", access: ["payment", "shop", "panel", "manage"] },
        "staff_pay": { pass: "1122", role: "MODERATOR", access: ["payment"] }, 
        "staff_dev": { pass: "3344", role: "DEVELOPER", access: ["panel", "manage"] }
    };

    function checkLogin() {
        const user = document.getElementById('staff_user').value;
        const pass = document.getElementById('staff_pass').value;

        if(STAFF_DATA[user] && STAFF_DATA[user].pass === pass) {
            const current = STAFF_DATA[user];
            document.getElementById('auth-screen').style.display = "none";
            document.getElementById('admin-dashboard').style.display = "block";
            document.getElementById('greet-user').innerText = "Hello, " + user;
            document.getElementById('user-role').innerText = "Role: " + current.role;

            // পারমিশন চেক করে সেকশন দেখানো
            current.access.forEach(id => {
                if(document.getElementById('sec-' + id)) {
                    document.getElementById('sec-' + id).style.display = "block";
                }
            });
            alert("Login Successful!");
        } else {
            alert("Invalid Credentials!");
        }
    }

    // ১০০টি ফিচারের লিস্ট জেনারেট
    const features = ["Aimbot 100%", "Aim Lock", "Auto Headshot", "Magic Bullet", "High Damage", "No Recoil", "Zero Shake", "Antenna Head", "Antenna Hand", "ESP Line", "ESP Name", "ESP Distance", "ESP Health", "Wallhack", "Chams Color", "Speed Hack 2x", "Fly Hack", "Ghost Hack", "Teleport Kill", "Underground Walk", "Auto Emote", "Unlock All Skin", "Night Mode", "HD Graphics", "Anti-Ban VIP", "Bypass Security", "No Grass", "No Fog", "Water Walk", "Fast Reload", "Infinite Ammo", "Rapid Fire", "Scope Zoom 8x", "Sensitivity 100x", "Lag Fix", "Device Unban", "ID Unban", "Auto Win", "Fast Medkit", "Run in Water"];
    const selector = document.getElementById('feature-selector');
    for(let i=1; i<=100; i++){
        let fName = features[i-1] || `Premium Feature ${i}`;
        selector.innerHTML += `<div><input type="checkbox" value="${fName}" onchange="updateDesc()" style="width:20px;"> ${fName}</div>`;
    }

    function updateDesc() {
        const checked = Array.from(document.querySelectorAll('#feature-selector input:checked')).map(el => el.value);
        document.getElementById('p_desc').value = checked.join(", ");
    }

    // --- আগের লজিকগুলো (Numbers, Notice, Panels) ---
    function saveNumbers() {
        const bk = document.getElementById('bk_num').value;
        const ng = document.getElementById('ng_num').value;
        if(bk && ng) { db.update({ pay_numbers: bk + "," + ng }); alert("Saved!"); }
    }

    function updateData(key, id) {
        const val = document.getElementById(id).value;
        if(val) { db.update({ [key]: val }); alert("Updated!"); }
    }

    db.child('payment_requests').on('value', (snap) => {
        const list = document.getElementById('payment-list');
        list.innerHTML = "";
        const data = snap.val();
        if (data) {
            Object.keys(data).forEach(key => {
                list.innerHTML += `<div class="req-card"><span>TrxID: ${data[key].trxID}</span> <button onclick="approve('${key}')" style="width:auto; background:#28a745; padding:5px 15px;">Approve</button></div>`;
            });
        } else { list.innerHTML = "No Requests"; }
    });

    db.child('panels').on('value', (snap) => {
        const pList = document.getElementById('panels-list');
        pList.innerHTML = "";
        const data = snap.val();
        if(data){
            Object.keys(data).forEach(key => {
                pList.innerHTML += `<div class="panel-item"><span>${data[key].name}</span> <button onclick="db.child('panels').child('${key}').remove()" style="width:auto; background:red; padding:5px;">Remove</button></div>`;
            });
        }
    });

    function addPanel() {
        const name = document.getElementById('p_name').value;
        const logo = document.getElementById('p_logo').value;
        const price = document.getElementById('p_price').value;
        const desc = document.getElementById('p_desc').value;
        if(name && price) { db.child('panels').push({ name, logo, price, desc }); alert("Panel Deployed!"); }
    }

    function approve(key) {
        db.update({ is_approved: "yes" }).then(() => {
            db.child('payment_requests').child(key).remove();
            alert("Access Granted!");
        });
    }
</script>
</body>
</html>
